<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper to Me ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ── SHARED ── */
  :root {
    --yellow: #FFE135;
    --coral: #FF6B6B;
    --mint: #4ECDC4;
    --purple: #A855F7;
    --pink: #FF85C2;
    --orange: #FF9F43;
    --green: #4ade80;

    /* public theme */
    --pub-bg: #FFFBF0;
    --pub-dark: #1a1a2e;

    /* admin theme */
    --adm-bg: #0d0d0d;
    --adm-surface: #161616;
    --adm-card: #1e1e1e;
    --adm-border: #2a2a2a;
    --adm-text: #f0f0f0;
    --adm-muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; }

  /* ════════════════════════════
     PUBLIC FORM
  ════════════════════════════ */
  #publicApp {
    background: var(--pub-bg);
    min-height: 100vh;
    display: none;
    overflow: hidden;
  }
  #publicApp.active {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .blob-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.22; animation: blobFloat 9s ease-in-out infinite; }
  .blob-1 { width: 420px; height: 420px; background: var(--coral); top: -120px; left: -120px; }
  .blob-2 { width: 360px; height: 360px; background: var(--mint); bottom: -80px; right: -80px; animation-delay: 3s; }
  .blob-3 { width: 280px; height: 280px; background: var(--purple); top: 40%; left: 10%; animation-delay: 6s; }
  .blob-4 { width: 220px; height: 220px; background: var(--yellow); bottom: 20%; right: 15%; animation-delay: 1.5s; }
  @keyframes blobFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-28px) scale(1.04)} }

  .pub-stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .pub-star { position: absolute; animation: starFloat linear infinite; opacity: 0.35; }
  @keyframes starFloat {
    0%{transform:translateY(110vh) rotate(0deg);opacity:0}
    10%{opacity:0.35} 90%{opacity:0.35}
    100%{transform:translateY(-60px) rotate(360deg);opacity:0}
  }

  .stage {
    position: relative; z-index: 1;
    width: 100%; max-width: 500px; padding: 20px;
    display: flex; align-items: center; justify-content: center;
    height: 100vh;
  }

  .screen {
    position: absolute; width: calc(100% - 40px);
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    opacity: 0; pointer-events: none;
    transform: translateY(50px) scale(0.95);
    transition: opacity 0.42s cubic-bezier(0.4,0,0.2,1), transform 0.42s cubic-bezier(0.4,0,0.2,1);
  }
  .screen.active { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); position: relative; }
  .screen.exit-up { opacity: 0; transform: translateY(-50px) scale(0.95); pointer-events: none; }

  /* Start screen */
  .start-emoji { font-size: 68px; margin-bottom: 14px; animation: pulse 2.2s ease infinite; display: block; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .start-title { font-family: 'Pacifico', cursive; font-size: clamp(40px,10vw,66px); color: var(--pub-dark); line-height: 1.1; margin-bottom: 12px; }
  .start-title span { background: linear-gradient(135deg, var(--coral), var(--orange), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .start-sub { font-size: 15px; font-weight: 700; color: #777; margin-bottom: 32px; max-width: 320px; line-height: 1.65; }

  .dots { display: flex; gap: 9px; margin-bottom: 22px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #e5e5e5; border: 2px solid var(--pub-dark); transition: all 0.3s; }
  .dot.done { background: var(--coral); }
  .dot.active { background: var(--yellow); transform: scale(1.35); }

  .q-card { background: white; border-radius: 26px; border: 3px solid var(--pub-dark); box-shadow: 7px 7px 0 var(--pub-dark); padding: 30px 26px; width: 100%; position: relative; overflow: hidden; margin-bottom: 16px; }
  .q-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; }
  .card-c1::before { background: linear-gradient(90deg, var(--coral), var(--orange)); }
  .card-c2::before { background: linear-gradient(90deg, var(--mint), #3B82F6); }
  .card-c3::before { background: linear-gradient(90deg, var(--purple), var(--pink)); }
  .card-c4::before { background: linear-gradient(90deg, var(--yellow), var(--orange)); }

  .q-step { font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #ccc; margin-bottom: 8px; }
  .q-icon { font-size: 38px; margin-bottom: 10px; display: block; }
  .q-text { font-size: 20px; font-weight: 900; color: var(--pub-dark); margin-bottom: 18px; line-height: 1.4; }

  .pub-input {
    width: 100%; padding: 13px 16px;
    border: 2.5px solid #e8e8e8; border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
    color: var(--pub-dark); background: #FAFAFA; outline: none;
    transition: all 0.2s; text-align: center;
  }
  .pub-input:focus { border-color: var(--coral); background: white; box-shadow: 0 0 0 4px rgba(255,107,107,0.1); }
  .pub-textarea { resize: none; height: 88px; text-align: left; }
  .hint { font-size: 12px; font-weight: 700; color: #ccc; margin-top: 7px; }

  .pub-btn { padding: 14px 36px; border: 3px solid var(--pub-dark); border-radius: 15px; font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; cursor: pointer; box-shadow: 5px 5px 0 var(--pub-dark); transition: all 0.14s; }
  .pub-btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--pub-dark); }
  .pub-btn:active { transform: translate(3px,3px); box-shadow: 2px 2px 0 var(--pub-dark); }
  .pub-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-start { background: var(--coral); color: white; font-size: 19px; }
  .btn-next { background: var(--yellow); color: var(--pub-dark); width: 100%; }
  .btn-submit { background: var(--coral); color: white; width: 100%; }
  .btn-skip { background: transparent; border: 2px dashed #ddd; color: #bbb; box-shadow: none; font-size: 13px; padding: 8px 20px; margin-top: 8px; width: 100%; }
  .btn-skip:hover { transform: none; box-shadow: none; color: #888; border-color: #bbb; }

  .saving-msg { display: none; align-items: center; justify-content: center; gap: 10px; font-size: 14px; font-weight: 800; color: #888; margin-top: 10px; }
  .saving-msg.show { display: flex; }
  .pub-spinner { width: 18px; height: 18px; border: 3px solid #eee; border-top-color: var(--coral); border-radius: 50%; animation: spin 0.7s linear infinite; }

  /* Thank you */
  .ty-emoji { font-size: 62px; margin-bottom: 8px; display: block; animation: wiggle 1.3s ease infinite; }
  @keyframes wiggle { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
  .ty-title { font-family: 'Pacifico', cursive; font-size: 44px; color: var(--pub-dark); margin-bottom: 10px; }
  .ty-wish { font-size: 14px; font-weight: 700; color: #666; line-height: 1.7; padding: 14px 18px; background: linear-gradient(135deg,#FFF9E9,#FFECEC); border-radius: 16px; border: 2px dashed var(--orange); margin-bottom: 18px; max-width: 340px; }
  .coupon-label { font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #bbb; margin-bottom: 8px; }
  .coupon-code { display: inline-block; background: var(--yellow); color: var(--pub-dark); font-family: 'Pacifico', cursive; font-size: 30px; padding: 10px 26px; border-radius: 16px; border: 3px solid var(--pub-dark); box-shadow: 4px 4px 0 var(--pub-dark); letter-spacing: 3px; margin-bottom: 8px; }
  .ty-note { font-size: 12px; font-weight: 700; color: #ccc; margin-bottom: 20px; }
  .btn-dl { background: var(--mint); color: var(--pub-dark); display: inline-flex; align-items: center; gap: 8px; padding: 13px 26px; border: 3px solid var(--pub-dark); border-radius: 14px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0 var(--pub-dark); transition: all 0.14s; }
  .btn-dl:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--pub-dark); }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .shake { animation: shake 0.3s ease; }

  .pub-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--pub-dark); color: white; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 800; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
  .pub-toast.show { transform: translateX(-50%) translateY(0); }

  /* ════════════════════════════
     ADMIN PANEL
  ════════════════════════════ */
  #adminApp {
    background: var(--adm-bg);
    color: var(--adm-text);
    min-height: 100vh;
    display: none;
  }
  #adminApp.active { display: block; }

  /* Login */
  .adm-login {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .adm-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,225,53,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(255,225,53,0.04) 1px,transparent 1px); background-size: 40px 40px; }
  .adm-login-box { position: relative; z-index: 1; background: var(--adm-surface); border: 1.5px solid var(--adm-border); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 60px rgba(255,225,53,0.06); }
  .adm-login-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .adm-login-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 900; color: var(--yellow); margin-bottom: 6px; }
  .adm-login-sub { font-size: 13px; color: var(--adm-muted); margin-bottom: 32px; font-weight: 700; }
  .adm-login-input { width: 100%; padding: 14px 18px; background: var(--adm-card); border: 1.5px solid var(--adm-border); border-radius: 12px; color: var(--adm-text); font-family: 'Space Mono', monospace; font-size: 15px; outline: none; text-align: center; letter-spacing: 3px; transition: border-color 0.2s; margin-bottom: 16px; }
  .adm-login-input:focus { border-color: var(--yellow); }
  .adm-login-input:disabled { opacity: 0.5; }
  .adm-login-btn { width: 100%; padding: 14px; background: var(--yellow); color: #0d0d0d; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 900; cursor: pointer; transition: opacity 0.2s, transform 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .adm-login-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .adm-login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .adm-login-spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #0d0d0d; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .adm-login-spinner.show { display: block; }
  .adm-login-err { font-size: 13px; color: var(--coral); font-weight: 700; margin-top: 12px; display: none; }
  .adm-login-err.show { display: block; }
  .adm-setup-hint { margin-top: 20px; padding: 14px 16px; background: rgba(255,225,53,0.06); border: 1px solid rgba(255,225,53,0.15); border-radius: 10px; font-size: 12px; color: var(--adm-muted); font-weight: 700; line-height: 1.6; display: none; text-align: left; }
  .adm-setup-hint.show { display: block; }
  .adm-setup-hint code { background: var(--adm-card); padding: 2px 6px; border-radius: 4px; font-family: 'Space Mono', monospace; color: var(--yellow); font-size: 11px; }

  /* Dashboard */
  .adm-dashboard { display: none; }
  .adm-dashboard.show { display: block; }

  .adm-topbar { position: sticky; top: 0; z-index: 50; background: rgba(13,13,13,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--adm-border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .adm-topbar-left { display: flex; align-items: center; gap: 14px; }
  .adm-logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 900; color: var(--yellow); }
  .adm-badge { background: var(--adm-card); border: 1px solid var(--adm-border); border-radius: 20px; padding: 4px 14px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--adm-muted); }
  .adm-topbar-right { display: flex; align-items: center; gap: 10px; }
  .adm-live-pill { display: flex; align-items: center; gap: 6px; background: var(--adm-card); border: 1px solid var(--adm-border); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 800; }
  .dot-live { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: livePulse 1.5s ease infinite; }
  @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .adm-logout { padding: 7px 16px; background: transparent; border: 1px solid var(--adm-border); border-radius: 8px; color: var(--adm-muted); font-size: 13px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
  .adm-logout:hover { color: var(--coral); border-color: var(--coral); }

  .adm-main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  .adm-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .adm-stat { background: var(--adm-surface); border: 1px solid var(--adm-border); border-radius: 16px; padding: 20px 22px; position: relative; overflow: hidden; }
  .adm-stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .adm-s1::before { background: var(--yellow); }
  .adm-s2::before { background: var(--coral); }
  .adm-s3::before { background: var(--mint); }
  .adm-s4::before { background: var(--purple); }
  .adm-stat-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--adm-muted); margin-bottom: 8px; }
  .adm-stat-val { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 900; }
  .adm-stat-icon { position: absolute; right: 18px; top: 18px; font-size: 22px; opacity: 0.5; }

  .adm-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .adm-search { flex: 1; min-width: 200px; padding: 11px 16px; background: var(--adm-surface); border: 1px solid var(--adm-border); border-radius: 10px; color: var(--adm-text); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; outline: none; transition: border-color 0.2s; }
  .adm-search:focus { border-color: var(--yellow); }
  .adm-search::placeholder { color: var(--adm-muted); }
  .adm-sort { padding: 11px 18px; background: var(--adm-surface); border: 1px solid var(--adm-border); border-radius: 10px; color: var(--adm-muted); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .adm-sort:hover, .adm-sort.active { border-color: var(--yellow); color: var(--yellow); }
  .adm-lottery-btn { padding: 11px 22px; background: var(--yellow); border: none; border-radius: 10px; color: #0d0d0d; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 900; cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  .adm-lottery-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,225,53,0.3); }

  .adm-grid-entries { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  .entry-card { background: var(--adm-surface); border: 1px solid var(--adm-border); border-radius: 16px; padding: 22px; position: relative; transition: border-color 0.2s, transform 0.2s; animation: cardIn 0.4s ease both; }
  @keyframes cardIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .entry-card:hover { border-color: #3a3a3a; transform: translateY(-2px); }
  .entry-card.winner { border-color: var(--yellow); box-shadow: 0 0 30px rgba(255,225,53,0.15); }
  .entry-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .anon-name { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--yellow); background: rgba(255,225,53,0.08); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,225,53,0.2); }
  .coupon-tag { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--adm-muted); background: var(--adm-card); padding: 3px 10px; border-radius: 6px; border: 1px solid var(--adm-border); }
  .answer-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .answer-chip { flex: 1; background: var(--adm-card); border: 1px solid var(--adm-border); border-radius: 10px; padding: 10px 12px; }
  .answer-chip-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--adm-muted); margin-bottom: 4px; }
  .answer-chip-val { font-size: 14px; font-weight: 800; }
  .extra-msg { background: var(--adm-card); border: 1px solid var(--adm-border); border-radius: 10px; padding: 12px; font-size: 13px; font-weight: 700; color: #aaa; line-height: 1.6; margin-bottom: 12px; font-style: italic; }
  .device-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .device-tag { font-size: 11px; font-weight: 700; background: var(--adm-card); border: 1px solid var(--adm-border); border-radius: 6px; padding: 3px 9px; color: var(--adm-muted); }
  .device-tag.hl { color: var(--mint); border-color: rgba(78,205,196,0.3); background: rgba(78,205,196,0.06); }
  .entry-time { font-size: 11px; color: var(--adm-muted); font-weight: 700; margin-top: 12px; font-family: 'Space Mono', monospace; }
  .winner-crown { position: absolute; top: -12px; right: 16px; font-size: 24px; animation: crownBounce 1s ease infinite; }
  @keyframes crownBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  .adm-empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--adm-muted); }
  .adm-empty .ei { font-size: 48px; display: block; margin-bottom: 16px; }
  .adm-empty p { font-size: 16px; font-weight: 700; }

  /* Lottery modal */
  .adm-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .adm-modal-overlay.show { display: flex; }
  .adm-modal { background: var(--adm-surface); border: 1px solid var(--adm-border); border-radius: 24px; padding: 48px 40px; max-width: 420px; width: 100%; text-align: center; animation: modalPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes modalPop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-trophy { font-size: 64px; display: block; margin-bottom: 12px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 900; color: var(--yellow); margin-bottom: 6px; }
  .modal-sub { font-size: 14px; color: var(--adm-muted); font-weight: 700; margin-bottom: 28px; }
  .winner-reveal { background: var(--adm-card); border: 1.5px solid var(--yellow); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
  .winner-anon { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; color: var(--yellow); margin-bottom: 8px; }
  .winner-coupon { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--adm-muted); }
  .winner-chips { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
  .winner-chip { background: rgba(255,225,53,0.1); border: 1px solid rgba(255,225,53,0.2); border-r
